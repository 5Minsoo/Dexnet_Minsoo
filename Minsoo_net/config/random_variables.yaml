# ---------------------------------------------------------
# 불확실성(Uncertainty) 모델링을 위한 Gaussian 노이즈 설정값
# 단위: 미터(m), 라디안(rad), 스케일 비율 등
# ---------------------------------------------------------

# 1. 객체 및 그리퍼 위치/회전 노이즈 (Translation & Rotation)
# 위치 노이즈 (예: 0.005 = 5mm의 위치 오차)
sigma_translation: 0.003

# 회전 노이즈 (예: 0.05 = 약 2.8도의 각도 오차)
sigma_rotation: 0.05

# 2. 객체 고유 속성 노이즈 (Object Pose RV)
# 크기(Scale) 노이즈 (예: 0.01 = 1%의 크기 오차)
sigma_scale: 0.05

# 무게중심(Center of Mass) 노이즈 (예: 0.002 = 2mm의 무게중심 오차)
sigma_center_of_mass: 0.002

# 3. 그리퍼 고유 속성 노이즈 (Grasp Pose RV)
# 그리퍼 접근 각도(Approach Angle) 노이즈 (예: 0.05 = 약 2.8도의 접근 각도 오차)
sigma_gripper_approach_angle: 0.05

# 4. 물리/환경 파라미터 노이즈 (Params RV)
# 표면 마찰 계수(Friction Coefficient) 노이즈
sigma_friction: 0.15